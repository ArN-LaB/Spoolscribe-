<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SpoolScribe">
  <defs>
    <linearGradient id="ss-bg" x1="64" y1="48" x2="448" y2="464" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#23C4D8"/>
      <stop offset="0.55" stop-color="#3E8EF0"/>
      <stop offset="1" stop-color="#5B4BE6"/>
    </linearGradient>
    <linearGradient id="ss-thread" x1="160" y1="150" x2="392" y2="404" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#DDF7FF"/>
    </linearGradient>
    <radialGradient id="ss-shine" cx="0.32" cy="0.28" r="0.9">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="0.6" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- App tile -->
  <rect x="24" y="24" width="464" height="464" rx="116" fill="url(#ss-bg)"/>
  <rect x="24" y="24" width="464" height="464" rx="116" fill="url(#ss-shine)"/>

  <!-- Filament spool (face-on): white ring -->
  <path fill="url(#ss-thread)" fill-rule="evenodd"
        d="M226 104a142 142 0 1 0 0 284 142 142 0 0 0 0-284Zm0 78a64 64 0 1 1 0 128 64 64 0 0 1 0-128Z"/>

  <!-- Spool hub + axle hole -->
  <circle cx="226" cy="246" r="40" fill="url(#ss-thread)"/>
  <circle cx="226" cy="246" r="16" fill="#3E8EF0"/>

  <!-- Spool vent holes -->
  <circle cx="226" cy="150" r="13" fill="#3E8EF0"/>
  <circle cx="226" cy="342" r="13" fill="#3E8EF0"/>
  <circle cx="130" cy="246" r="13" fill="#3E8EF0"/>
  <circle cx="322" cy="246" r="13" fill="#3E8EF0"/>

  <!-- Filament strand peeling off and writing an S-curve (the "Scribe") -->
  <path d="M360 230
           C 412 224 436 262 408 298
           C 384 328 330 322 328 358
           C 326 392 356 408 394 400"
        fill="none" stroke="url(#ss-thread)" stroke-width="28"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Strand tip nib -->
  <circle cx="394" cy="400" r="17" fill="url(#ss-thread)"/>
</svg>
