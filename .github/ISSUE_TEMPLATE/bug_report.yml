name: Bug report
description: Report a problem with SpoolScribe
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in the details below.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: When I do X, Y happens instead of Z.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. Search for SKU ...
        3. Click ...
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Windows 11 / macOS 14 / Ubuntu 24.04
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: SpoolScribe version / commit
      placeholder: v0.1.0 or commit hash
  - type: input
    id: python
    attributes:
      label: Python version (if running from source)
      placeholder: 3.12.x
  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      render: shell
