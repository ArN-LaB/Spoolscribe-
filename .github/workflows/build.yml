name: Build multiplatform

on:
  push:
    tags: ["v*"]
  workflow_dispatch:        # build manuel depuis l'onglet Actions

permissions:
  contents: write           # nécessaire pour publier une Release sur tag

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: SpoolScribe-windows
          - os: macos-latest
            artifact: SpoolScribe-macos
          - os: ubuntu-latest
            artifact: SpoolScribe-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux Qt runtime deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0 libdbus-1-3

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller spoolscribe.spec --noconfirm

      - name: Package artifact (zip)
        shell: bash
        run: |
          cd dist
          7z a "../${{ matrix.artifact }}.zip" SpoolScribe >/dev/null 2>&1 || zip -r "../${{ matrix.artifact }}.zip" SpoolScribe

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*.zip
