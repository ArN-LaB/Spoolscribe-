name: Build multiplatform

on:
  push:
    tags: ["v*"]
  workflow_dispatch:        # build manuel depuis l'onglet Actions

permissions:
  contents: write           # nécessaire pour publier une Release sur tag

jobs:
  # Garde-fou : sur un tag vX.Y.Z, on vérifie que le tag correspond bien à
  # core.APP_VERSION (source unique de vérité). Évite les releases accidentelles
  # ou désynchronisées — la cause de l'ancienne release "sync version" inutile.
  verify:
    name: Verify tag matches version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check tag == core.APP_VERSION
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          CORE=$(python -c "import re,io; s=open('core.py',encoding='utf-8').read(); print(re.search(r'APP_VERSION\s*=\s*[\"\x27]([^\"\x27]+)', s).group(1))")
          echo "tag=$TAG  core.APP_VERSION=$CORE"
          if [ "$TAG" != "$CORE" ]; then
            echo "::error::Tag v$TAG does not match core.APP_VERSION ($CORE). Bump core.py and re-tag."
            exit 1
          fi

  build:
    name: Build ${{ matrix.os }}
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: SpoolScribe-windows
          - os: macos-latest
            artifact: SpoolScribe-macos
          - os: ubuntu-latest
            artifact: SpoolScribe-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Linux Qt runtime deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0 libdbus-1-3

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller spoolscribe.spec --noconfirm

      - name: Package artifact (zip + SHA256)
        shell: bash
        run: |
          cd dist
          # onefile : dist/ contient l'exécutable (ou le .app sur macOS).
          # On zippe tout son contenu pour rester générique entre OS.
          7z a "../${{ matrix.artifact }}.zip" ./* >/dev/null 2>&1 || zip -r "../${{ matrix.artifact }}.zip" ./*
          cd ..
          # Empreinte SHA256 pour que les utilisateurs vérifient l'intégrité.
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.artifact }}.zip" > "${{ matrix.artifact }}.zip.sha256"
          else
            shasum -a 256 "${{ matrix.artifact }}.zip" > "${{ matrix.artifact }}.zip.sha256"
          fi
          cat "${{ matrix.artifact }}.zip.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.zip
            ${{ matrix.artifact }}.zip.sha256
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BODY=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body: ${{ steps.changelog.outputs.body }}
          files: |
            artifacts/**/*.zip
            artifacts/**/*.zip.sha256
